<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Connecte-toi à Corya pour construire, vendre et mesurer ton produit digital."
    />
    <title>Corya — Login</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%23BC9BFF'/%3E%3Cpath d='M42.8 24.4c-2-2.2-5.1-3.6-9.2-3.6-7.7 0-13.1 5-13.1 11.8 0 6.9 5.4 11.7 13.2 11.7 4.1 0 7.4-1.4 9.5-3.8l-3.6-3.1c-1.4 1.4-3.2 2.2-5.5 2.2-4.4 0-7.2-2.8-7.2-7s2.8-7.1 7.2-7.1c2.3 0 4 .7 5.4 2.1l3.3-3.2Z' fill='%23282635'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-panel" aria-label="Connexion Corya">
        <header class="auth-topbar">
          <a class="auth-brand" href="/" aria-label="Corya">
            <span>corya</span>
          </a>
          <button class="top-mode" type="button" data-auth-mode="signup">Sign up</button>
        </header>

        <div class="auth-form-wrap">
          <h1 data-auth-title>Welcome back</h1>
          <p class="sr-only" data-auth-subtitle>Sign in to continue to your Corya workspace.</p>

          <div class="provider-stack" aria-label="Connexion rapide">
            <button class="provider-button" type="button" data-provider="google">
              <span class="google-mark" aria-hidden="true">G</span>
              <span>Sign in with Google</span>
            </button>
            <button class="provider-button" type="button" data-provider="twitter">
              <span class="x-mark" aria-hidden="true">𝕏</span>
              <span>Sign in with X</span>
            </button>
          </div>

          <div class="auth-divider" aria-hidden="true">
            <span></span>
            <em>or</em>
            <span></span>
          </div>

          <form class="auth-form" data-auth-form>
            <label class="field" data-name-field hidden>
              <span class="sr-only">Name</span>
              <input name="name" type="text" autocomplete="name" placeholder="Name" />
            </label>

            <label class="field">
              <span class="sr-only">Email</span>
              <input name="email" type="email" autocomplete="email" placeholder="Email" required />
            </label>

            <label class="field password-field">
              <span class="sr-only">Password</span>
              <input
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Password"
                minlength="6"
                required
              />
              <button class="password-toggle" type="button" aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.5 12s3.4-5.5 9.5-5.5 9.5 5.5 9.5 5.5-3.4 5.5-9.5 5.5S2.5 12 2.5 12Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="2.8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                </svg>
              </button>
            </label>

            <div class="auth-options">
              <label class="remember">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>
              <button class="plain-button" type="button">Forgot password?</button>
            </div>

            <button class="auth-submit" type="submit" data-auth-submit>
              <span>Sign in</span>
              <span aria-hidden="true">→</span>
            </button>

            <p class="auth-error" data-auth-error aria-live="polite"></p>
            <p class="auth-note" data-auth-note></p>
          </form>

          <p class="mode-copy" data-mode-copy>
            New to corya?
            <button type="button" data-auth-mode="signup">Create an account</button>
          </p>
        </div>

        <footer class="auth-footer">
          <span>© 2026 corya</span>
          <nav aria-label="Legal links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
          </nav>
        </footer>
      </section>

      <aside class="auth-visual" aria-hidden="true">
        <img src="public/assets/auth/login-cherry-tree.png" alt="" />
      </aside>
    </main>

    <script src="auth-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
  </body>
</html>
